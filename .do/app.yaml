# DigitalOcean App Platform — optional spec (Apps → Create → From spec).
# After import, open the app → Settings → App-Level Environment Variables and add:
#   NEXT_PUBLIC_MAPBOX_TOKEN (required at build + run)
#   GEE_PRIVATE_KEY (Earth Engine: full service account JSON, one line) — preferred on App Platform
#   EARTH_ENGINE_PROJECT (optional if JSON includes project_id)
#   GOOGLE_APPLICATION_CREDENTIALS_JSON (alternate; ignored if GEE_PRIVATE_KEY is set)
#
# Or create the app from the UI: GitHub repo → Dockerfile on main → add the same variables.

name: alabama-power-dashboard
region: nyc

services:
  - name: web
    github:
      repo: AbbySeneor/alabama-power-dashboard
      branch: main
      deploy_on_push: true

    dockerfile_path: Dockerfile
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    # If /api/ee/* returns 504 after deploy, try basic-xs or larger in the DO UI (more CPU/RAM).

    health_check:
      http_path: /

    routes:
      - path: /
